kind: pipeline
type: docker
name: build

clone:
  skip_verify: true

steps:
  - name: pytests
    image: harbor.cantrip.com/ci-tools/python-tester-runner:latest
    commands:
      - pip install -r flask/requirements.txt
      - ./infra-scripts/run-pytests.sh
  - name: jest
    image: harbor.cantrip.com/ci-tools/node-tester-runner:latest
    commands:
      - ./infra-scripts/run-jest.sh
  - name: check-version-bump
    image: harbor.cantrip.com/ci-tools/python-tester-runner:latest
    commands:
      - ./infra-scripts/check-version-bump.sh
    when:
      branch:
        exclude:
          - main
  - name: build-image
    image: harbor.cantrip.com/ci-tools/dind-builder-runner:latest
    volumes:
      - name: dockersock
        path: /var/run
    environment:
      HARBOR_USERNAME:
        from_secret: HARBOR_USERNAME
      HARBOR_PASSWORD:
        from_secret: HARBOR_PASSWORD
    commands:
      - sleep 5
      - echo "$HARBOR_PASSWORD" | docker login -u "$HARBOR_USERNAME" --password-stdin harbor.cantrip.com
      - ./infra-scripts/build-image.sh --push --git-tag --latest --image-path harbor.cantrip.com/webapps/data-visualizer/flask
  - name: version-check
    image: harbor.cantrip.com/ci-tools/python-tester-runner:latest
    commands:
      - pip install pyyaml
      - git fetch origin +refs/heads/main:refs/remotes/origin/main
      - python infra-scripts/version_bump.py --config infra-scripts/version-config.json --compare-to-branch --branch origin/main

services:
  - name: docker
    image: harbor.cantrip.com/ci-tools/dind-builder-runner:latest
    privileged: true
    volumes:
      - name: dockersock
        path: /var/run

volumes:
  - name: dockersock
    temp: {}
