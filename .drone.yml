kind: pipeline
type: docker
name: build

clone:
  skip_verify: true

steps:
  - name: lint-python
    image: harbor.cantrip.com/ci-tools/python-tester-runner:latest
    depends_on: []
    commands:
      - pip install uv
      - uv sync --frozen
      - uv run ruff check flask infra-scripts
      - uv run ruff format --check flask infra-scripts
  - name: lint-bash
    image: alpine:3.19
    depends_on: []
    commands:
      - apk add --no-cache shellcheck shfmt
      - shellcheck infra-scripts/*.sh flask/*.sh react/*.sh
      - shfmt -d -i 2 -ci infra-scripts/*.sh flask/*.sh react/*.sh
  - name: lint-react
    image: harbor.cantrip.com/ci-tools/node-tester-runner:latest
    depends_on: []
    commands:
      - cd react
      - npm ci
      - npm run lint
      - npm run format:check
  - name: lint-helm
    image: alpine/helm:3.14.0
    depends_on: []
    commands:
      - helm lint helm-chart/data-visualizer
  - name: pytests
    image: harbor.cantrip.com/ci-tools/python-tester-runner:latest
    depends_on:
      - lint-python
      - lint-bash
      - lint-react
      - lint-helm
    commands:
      - pip install uv
      - uv sync --frozen
      - ./infra-scripts/run-pytests.sh
  - name: jest
    image: harbor.cantrip.com/ci-tools/node-tester-runner:latest
    depends_on:
      - pytests
    commands:
      - ./infra-scripts/run-jest.sh
  - name: cypress
    image: harbor.cantrip.com/ci-tools/node-tester-runner:latest
    depends_on:
      - jest
    commands:
      - pip install uv
      - uv sync --frozen
      - ./infra-scripts/run-cypress.sh
  - name: build-image
    image: harbor.cantrip.com/ci-tools/dind-builder-runner:latest
    depends_on:
      - cypress
    volumes:
      - name: dockersock
        path: /var/run
    environment:
      HARBOR_USERNAME:
        from_secret: HARBOR_USERNAME
      HARBOR_PASSWORD:
        from_secret: HARBOR_PASSWORD
    commands:
      - sleep 5
      - echo "$HARBOR_PASSWORD" | docker login -u "$HARBOR_USERNAME" --password-stdin harbor.cantrip.com
      - ./infra-scripts/build-image.sh --push --git-tag --latest --image-path harbor.cantrip.com/webapps/data-visualizer/flask
  - name: version-check
    image: harbor.cantrip.com/ci-tools/python-tester-runner:latest
    depends_on:
      - build-image
    commands:
      - git fetch origin +refs/heads/main:refs/remotes/origin/main
      - python infra-scripts/version_bump.py --config infra-scripts/version-config.json --compare-to-branch --branch origin/main

services:
  - name: docker
    image: harbor.cantrip.com/ci-tools/dind-builder-runner:latest
    privileged: true
    volumes:
      - name: dockersock
        path: /var/run

volumes:
  - name: dockersock
    temp: {}
