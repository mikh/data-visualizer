[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    ".venv",
    "react/node_modules",
    "react/dist",
    "flask/untracked",
    "flask/tests/testdata",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
]
ignore = [
    "E501", # line length handled by formatter
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
